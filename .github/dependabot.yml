version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Biome v2 ships a different config schema; major bumps need manual
      # migration of biome.json and re-running the formatter.
      - dependency-name: "@biomejs/biome"
        update-types: ["version-update:semver-major"]
      # TypeScript majors regularly change strictness defaults and emit
      # behavior; coordinate with the rest of the toolchain manually.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
