name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # pnpm 10.32 (pinned via packageManager) needs Node 22.13+;
          # consumers on Node 20 work fine, but our toolchain doesn't.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - if: matrix.os == 'ubuntu-latest'
        run: pnpm test:coverage
